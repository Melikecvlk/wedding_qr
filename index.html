<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Melike & Yahya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <svg class="botanical-top" viewBox="0 0 480 130" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect width="480" height="130" fill="#F5EDD8"/>
    <ellipse cx="240" cy="65" rx="260" ry="80" fill="#EDE0C4" opacity="0.4"/>
    <g stroke="#7A9E7E" stroke-linecap="round" fill="none">
      <path d="M10,120 Q40,90 70,70 Q100,50 130,35" stroke-width="1.6" opacity="0.7"/>
      <ellipse cx="52" cy="92" rx="11" ry="5" fill="#A8C5AB" stroke="none" transform="rotate(-35,52,92)" opacity="0.75"/>
      <ellipse cx="78" cy="74" rx="12" ry="5" fill="#7A9E7E" stroke="none" transform="rotate(-50,78,74)" opacity="0.65"/>
      <ellipse cx="108" cy="52" rx="10" ry="4.5" fill="#A8C5AB" stroke="none" transform="rotate(-55,108,52)" opacity="0.70"/>
      <ellipse cx="130" cy="38" rx="9" ry="4" fill="#7A9E7E" stroke="none" transform="rotate(-60,130,38)" opacity="0.60"/>
      <circle cx="65" cy="84" r="5.5" fill="#D4909A" opacity="0.80"/>
      <circle cx="65" cy="84" r="3" fill="#E8B4B8" opacity="0.90"/>
      <circle cx="120" cy="43" r="4.5" fill="#D4909A" opacity="0.75"/>
      <circle cx="120" cy="43" r="2.5" fill="#E8B4B8" opacity="0.85"/>
    </g>
    <g stroke="#7A9E7E" stroke-linecap="round" fill="none">
      <path d="M470,120 Q440,90 410,70 Q380,50 350,35" stroke-width="1.6" opacity="0.7"/>
      <ellipse cx="428" cy="92" rx="11" ry="5" fill="#A8C5AB" stroke="none" transform="rotate(35,428,92)" opacity="0.75"/>
      <ellipse cx="402" cy="74" rx="12" ry="5" fill="#7A9E7E" stroke="none" transform="rotate(50,402,74)" opacity="0.65"/>
      <ellipse cx="372" cy="52" rx="10" ry="4.5" fill="#A8C5AB" stroke="none" transform="rotate(55,372,52)" opacity="0.70"/>
      <ellipse cx="350" cy="38" rx="9" ry="4" fill="#7A9E7E" stroke="none" transform="rotate(60,350,38)" opacity="0.60"/>
      <circle cx="415" cy="84" r="5.5" fill="#D4909A" opacity="0.80"/>
      <circle cx="415" cy="84" r="3" fill="#E8B4B8" opacity="0.90"/>
      <circle cx="360" cy="43" r="4.5" fill="#D4909A" opacity="0.75"/>
      <circle cx="360" cy="43" r="2.5" fill="#E8B4B8" opacity="0.85"/>
    </g>
    <g>
      <path d="M195,128 Q200,95 215,75 Q230,58 240,52" stroke="#7A9E7E" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.65"/>
      <path d="M285,128 Q280,95 265,75 Q250,58 240,52" stroke="#7A9E7E" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.65"/>
      <circle cx="240" cy="46" r="9" fill="#D4909A" opacity="0.90"/>
      <circle cx="240" cy="46" r="5.5" fill="#E8B4B8"/>
      <circle cx="240" cy="46" r="2.5" fill="#C9A84C" opacity="0.85"/>
      <circle cx="222" cy="65" r="4" fill="#D4909A" opacity="0.70"/>
      <circle cx="258" cy="65" r="4" fill="#D4909A" opacity="0.70"/>
      <ellipse cx="215" cy="80" rx="7" ry="3" fill="#A8C5AB" stroke="none" transform="rotate(-55,215,80)" opacity="0.70"/>
      <ellipse cx="265" cy="80" rx="7" ry="3" fill="#A8C5AB" stroke="none" transform="rotate(55,265,80)" opacity="0.70"/>
    </g>
    <line x1="60" y1="127" x2="420" y2="127" stroke="#C9A84C" stroke-width="0.8" opacity="0.40"/>
  </svg>

  <div class="card-body">

    <h1 class="names" style="margin-top:22px;">
      Melike <span class="amp">&amp;</span> Yahya
    </h1>
    <p class="tagline">14 Haziran 2025</p>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <p class="instruction">
      Düğünümüzde çektiğiniz fotoğraf ve videoları<br>
      bizimle paylaşmak ister misiniz? 🌿
    </p>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file" accept="image/*,video/*" multiple>
      <span class="drop-icon">📷</span>
      <span class="drop-label">Fotoğraf veya Video Seç</span>
      <span class="drop-sub">ya da buraya sürükle bırak</span>
    </div>

    <div id="preview-strip"></div>

    <div class="note-wrap">
      <textarea id="note" placeholder="İsterseniz bir not bırakabilirsiniz 🌸" rows="3"></textarea>
    </div>

    <button class="btn-upload" id="btn-upload" onclick="uploadFile()">
      Albüme Ekle
    </button>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="result"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
